<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<title>AutoPlan</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">

<style>
body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#f5f6f8;
margin:0;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.cars{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-bottom:15px;
}

button.car{
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

button.car.active{
outline:3px solid rgba(37,99,235,.4);
}

#calendar{
border:1px solid #eee;
border-radius:10px;
padding:10px;
}

.modalOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.modal{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

.btn{
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.btn.primary{background:#16a34a;color:white;}
.btn.danger{background:#dc2626;color:white;}

.row{
display:flex;
gap:10px;
justify-content:flex-end;
margin-top:10px;
}

.legend{
margin-bottom:10px;
font-size:14px;
}

.legend span{
display:inline-block;
width:10px;
height:10px;
border-radius:10px;
margin-right:5px;
}

.dom{background:#2563eb;}
.priv{background:#16a34a;}
</style>
</head>

<body>

<div class="container">

<h1>AutoPlan</h1>

<div class="legend">
<span class="dom"></span>Domizil
&nbsp;&nbsp;
<span class="priv"></span>Privat
</div>

<div class="cars">
<button class="car active" data-car="Auto 1">🚗 Auto 1</button>
<button class="car" data-car="Auto 2">🚗 Auto 2</button>
<button class="car" data-car="Auto 3">🚗 Auto 3</button>
<button class="car" data-car="Auto 4">🚗 Auto 4</button>
</div>

<div id="calendar"></div>

</div>


<div class="modalOverlay" id="modalOverlay">
<div class="modal">

<div><b id="mCar"></b></div>
<div id="mName"></div>
<div id="mTime"></div>

<div class="row">
<button class="btn" id="modalClose">Schliessen</button>
<button class="btn" id="modalEdit">Bearbeiten</button>
<button class="btn danger" id="modalDelete">Löschen</button>
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCVTH62pNLqZMh-8myCmQxjnXG_gvAPtB4",
authDomain:"autoplan-6b642.firebaseapp.com",
projectId:"autoplan-6b642"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let activeCar="Auto 1";
let allBookings=[];
let calendar=null;

const COLOR_DOM="#2563eb";
const COLOR_PRIV="#16a34a";

const DOMIZIL_RULES=[

{car:"Auto 1",name:"Bozo",dow:1,slot:"FULL"},
{car:"Auto 1",name:"Bozo",dow:3,slot:"FULL"},
{car:"Auto 1",name:"Bozo",dow:4,slot:"PM"},
{car:"Auto 1",name:"Mirjam",dow:2,slot:"FULL"},
{car:"Auto 1",name:"Mirjam",dow:5,slot:"FULL"},
{car:"Auto 1",name:"Barbara",dow:4,slot:"AM"},

{car:"Auto 2",name:"Vladimir",dow:1,slot:"AM"},
{car:"Auto 2",name:"Vladimir",dow:3,slot:"AM"},
{car:"Auto 2",name:"Kathi",dow:2,slot:"AM"},
{car:"Auto 2",name:"Kathi",dow:4,slot:"AM"},

{car:"Auto 3",name:"Jano",dow:2,slot:"PM"},
{car:"Auto 3",name:"Jano",dow:5,slot:"PM"},
{car:"Auto 3",name:"Sebi",dow:4,slot:"FULL"},
{car:"Auto 3",name:"Manuel",dow:1,slot:"PM"},
{car:"Auto 3",name:"Manuel",dow:3,slot:"PM"},

{car:"Auto 4",name:"Nadja",dow:1,slot:"PM"},
{car:"Auto 4",name:"Nadja",dow:4,slot:"PM"},
{car:"Auto 4",name:"Sebi",dow:2,slot:"FULL"},
{car:"Auto 4",name:"Vanessa",dow:3,slot:"FULL"},
{car:"Auto 4",name:"Vanessa",dow:5,slot:"FULL"}

];

const SLOT_TIMES={
AM:{start:"08:00",end:"12:00"},
PM:{start:"13:00",end:"17:00"}
};

function generateFixed(start,end){

let out=[];

DOMIZIL_RULES.forEach(rule=>{

let d=new Date(start);

while(d<=end){

let jsDow=d.getDay()===0?7:d.getDay();

if(jsDow===rule.dow){

let add=(slot)=>{

let t=SLOT_TIMES[slot];

out.push({
id:"FIX"+rule.name+d,
car:rule.car,
name:rule.name,
start:d.toISOString().slice(0,10)+"T"+t.start,
end:d.toISOString().slice(0,10)+"T"+t.end,
type:"domizil"
});

};

if(rule.slot==="FULL"){
add("AM");
add("PM");
}else{
add(rule.slot);
}

}

d.setDate(d.getDate()+1);

}

});

return out;

}

function renderCalendar(){

calendar.removeAllEvents();

let events=allBookings
.filter(b=>b.car===activeCar)
.map(b=>({

id:b.id,
title:b.car+" – "+b.name,
start:b.start,
end:b.end,
backgroundColor:b.type==="domizil"?COLOR_DOM:COLOR_PRIV,
borderColor:b.type==="domizil"?COLOR_DOM:COLOR_PRIV

}));

calendar.addEventSource(events);

}

function subscribe(){

db.collection("bookings").onSnapshot(snap=>{

let priv=snap.docs.map(d=>({id:d.id,...d.data()}));

let start=new Date();
start.setDate(start.getDate()-30);

let end=new Date();
end.setDate(end.getDate()+180);

let fixed=generateFixed(start,end);

allBookings=[...fixed,...priv];

renderCalendar();

});

}

calendar=new FullCalendar.Calendar(
document.getElementById("calendar"),
{
initialView:"timeGridWeek",
locale:"de",
firstDay:1,
nowIndicator:true,
slotMinTime:"06:00:00",
slotMaxTime:"21:00:00",
height:"auto",

buttonText:{
today:"Heute",
month:"Monat",
week:"Woche",
day:"Tag"
},

headerToolbar:{
left:"prev,next today",
center:"title",
right:"dayGridMonth,timeGridWeek,timeGridDay"
},

eventClick:(info)=>{

let b=allBookings.find(x=>x.id===info.event.id);
if(!b)return;

document.getElementById("mCar").textContent=b.car;
document.getElementById("mName").textContent=b.name;
document.getElementById("mTime").textContent=b.start+" → "+b.end;

document.getElementById("modalDelete").style.display=b.type==="privat"?"inline-block":"none";
document.getElementById("modalEdit").style.display=b.type==="privat"?"inline-block":"none";

document.getElementById("modalOverlay").style.display="flex";

window.current=b;

}

});

calendar.render();

document.querySelectorAll(".car").forEach(btn=>{
btn.onclick=()=>{
activeCar=btn.dataset.car;

document.querySelectorAll(".car").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

renderCalendar();
};
});

document.getElementById("modalClose").onclick=()=>{
document.getElementById("modalOverlay").style.display="none";
};

document.getElementById("modalDelete").onclick=async()=>{

if(!confirm("Termin löschen?"))return;

await db.collection("bookings").doc(window.current.id).delete();

document.getElementById("modalOverlay").style.display="none";

};

subscribe();

</script>

</body>
</html>
